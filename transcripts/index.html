<!DOCTYPE html>
<html lang="ja">
<head>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Margarine&family=Saira+Semi+Condensed&display=swap" rel="stylesheet">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transcript Links</title>
    <style>
      /* 基本設定 */
body {
    font-family: "Margarine", sans-serif;
    background-color: #8c8c8c;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* コンテナのスタイル */
.container {
    text-align: center;
    background-color: #fff;
    padding: 150px;
    border-radius: 15px;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
}

/* タイトルのスタイル */
h1 {
    color: #333;
    font-size: 2em;
    margin-bottom: 20px;
}

/* リンクボックスのスタイル */
.link-box {
    background-color: #e0e0e0;
    margin: 20px 0;
    padding: 20px;
    border-radius: 10px;
    transition: background-color 0.3s ease;
}

/* リンクのスタイル */
.link {
    font-size: 1.5em;
    text-decoration: none;
    color: #007BFF;
    font-weight: bold;
    display: block;
    margin-bottom: 10px;
    transition: color 0.3s ease;
}

.link:hover {
    color: #0056b3;
}

/* 説明文のスタイル */
p {
    font-size: 1em;
    color: #666;
}

/* リンクボックスのホバーエフェクト */
.link-box:hover {
    background-color: #d1d1d1;
}

    </style>
</head>
<body>
    <div class="container">
        <h1>Transcript Links</h1>
            <a href="https://unsnipeable.github.io/transcripts/gazou" class="link">
        <div class="link-box">
                Taku's Dog House 画像
            <p>昔の画像チャンネル</p>
        </div>
            </a>
        
            <a href="https://unsnipeable.github.io/transcripts/yuriffee" class="link">
        <div class="link-box">
                yuriffee 語録
            <p>yuriffeeがやらかしたりしたものをあげていきます。</p>
        </div>
            </a>
    </div>
    
<script language=javascript>

</script>
</body>
</html>
